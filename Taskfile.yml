version: '3'

dotenv: ['.env']

tasks:
  install:
    desc: Install all dependencies (Go, TypeSpec, Web)
    cmds:
      - task: install:go
      - task: install:node
      - task: install:web

  install:go:
    dir: api
    cmds:
      - go mod download

  install:node:
    dir: typespec
    cmds:
      - npm ci

  install:web:
    dir: web
    cmds:
      - npm install

  infra:up:
    desc: Start PostgreSQL and Piston containers
    cmds:
      - docker compose -f infra/docker-compose.yml --env-file .env up -d

  infra:down:
    desc: Stop containers
    cmds:
      - docker compose -f infra/docker-compose.yml --env-file .env down

  piston:install:
    desc: Install Python runtime in Piston (run once after infra:up)
    cmds:
      - curl -s -X POST http://localhost:2000/api/v2/packages -H "Content-Type:application/json" -d "{\"language\":\"python\",\"version\":\"3.10.0\"}"

  piston:install:java:
    desc: Install Java runtime in Piston
    cmds:
      - curl -s -X POST http://localhost:2000/api/v2/packages -H "Content-Type:application/json" -d "{\"language\":\"java\",\"version\":\"15.0.2\"}"

  piston:install:c:
    desc: Install C/C++ (gcc) runtime in Piston
    cmds:
      - curl -s -X POST http://localhost:2000/api/v2/packages -H "Content-Type:application/json" -d "{\"language\":\"gcc\",\"version\":\"10.2.0\"}"

  piston:install:js:
    desc: Install JavaScript (Node) runtime in Piston
    cmds:
      - curl -s -X POST http://localhost:2000/api/v2/packages -H "Content-Type:application/json" -d "{\"language\":\"node\",\"version\":\"20.11.1\"}"

  piston:install:csharp:
    desc: Install C# (Mono) runtime in Piston
    cmds:
      - curl -s -X POST http://localhost:2000/api/v2/packages -H "Content-Type:application/json" -d "{\"language\":\"mono\",\"version\":\"6.12.0\"}"

  piston:install:all:
    desc: Install all language runtimes in Piston (run once after infra:up)
    cmds:
      - task: piston:install
      - task: piston:install:java
      - task: piston:install:c
      - task: piston:install:js
      - task: piston:install:csharp

  gen:
    desc: TypeSpec -> OpenAPI -> Go codegen
    cmds:
      - task: gen:typespec
      - task: gen:go

  gen:typespec:
    desc: Compile TypeSpec to OpenAPI YAML
    dir: typespec
    cmds:
      - npx tsp compile .

  gen:go:
    desc: Generate Go code from OpenAPI YAML
    dir: api
    cmds:
      - go generate ./internal/openapi/...

  migrate:
    desc: Run DB migrations
    dir: api
    cmds:
      - go run ./cmd/migrate

  seed:
    desc: Seed problems into DB
    dir: api
    cmds:
      - go run ./cmd/seed

  build:
    desc: Build API server binary to bin/server.exe
    dir: api
    cmds:
      - go build -o ../bin/server.exe ./cmd/server

  run:
    desc: Build and run the API server
    cmds:
      - task: build
      - bin/server.exe

  stop:
    desc: Stop API server and Vite dev server
    cmds:
      - powershell -NoProfile -File scripts/stop-server.ps1 -Port 8080
      - powershell -NoProfile -File scripts/stop-server.ps1 -Port 3000
      - powershell -NoProfile -File scripts/stop-server.ps1 -Port 3001

  dev:
    desc: Run server in development mode (no build step)
    dir: api
    cmds:
      - go run ./cmd/server

  web:
    desc: Start frontend dev server (open http://localhost:3000)
    dir: web
    cmds:
      - node node_modules/vite/bin/vite.js

  web:build:
    desc: Build frontend for production (reads web/.env.production for VITE_API_BASE)
    dir: web
    cmds:
      - npm run build

  web:deploy:
    desc: Deploy frontend to Cloudflare Workers (build first)
    dir: web
    cmds:
      - npm run build
      - npx wrangler deploy

  deploy:api:
    desc: Deploy Go API to Cloud Run from source (set GCP project/region first)
    cmds:
      - gcloud run deploy learncode-api --source . --region asia-northeast1 --allow-unauthenticated

  check:
    desc: Smoke test the API (server must be running in another terminal)
    cmds:
      - echo === 正解コード - passed=true を期待 ===
      - 'curl -s -X POST http://localhost:8080/api/problems/1/submit -H "Content-Type:application/json" -d "{\"language\":\"python\",\"code\":\"print(''Hello, World!'')\"}"'
      - echo === 不正解コード - passed=false を期待 ===
      - 'curl -s -X POST http://localhost:8080/api/problems/1/submit -H "Content-Type:application/json" -d "{\"language\":\"python\",\"code\":\"print(''wrong'')\"}"'
