# Render Blueprint: Go バックエンド + 同一オリジンのフロント配信（Docker）。
# DB は Neon、Piston は Oracle VM（いずれも別管理）。
# 接続文字列など秘密値は sync:false にし、Render ダッシュボードで手入力する。
services:
  - type: web
    name: learncode
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore # 日本から近い無料リージョン
    autoDeploy: true # main への push で自動デプロイ
    healthCheckPath: /api/problems
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Neon の接続文字列（?sslmode=require 付き）を手入力
      - key: PISTON_URL
        sync: false # Oracle VM 上の Piston（例: http://<VM_IP>:2000）
      - key: JWT_SECRET
        generateValue: true # Render が強いランダム値を自動生成
      - key: STATIC_DIR
        value: /app/web
    # PORT は Render が自動注入し、config.go がそれを読む（明示設定は不要）。
